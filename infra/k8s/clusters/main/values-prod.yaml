# =============================================================================
# ML Portal Main Cluster - Production Values
# =============================================================================

global:
  environment: production
  domain: portal.example.com
  imageRegistry: registry.example.com
  imagePullSecrets:
    - name: registry-credentials

frontend:
  enabled: true
  replicaCount: 3
  image:
    tag: "1.0.0"  # Use specific version in prod
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6

api:
  enabled: true
  replicaCount: 5
  image:
    tag: "1.0.0"
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 15
  env:
    ENV: production
    DEBUG: "false"
    LOG_LEVEL: WARNING

workers:
  enabled: true
  replicaCount: 4
  image:
    tag: "1.0.0"
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 12

embedding:
  enabled: true
  replicaCount: 3
  image:
    tag: "1.0.0"
  persistence:
    enabled: true
    size: 20Gi

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "200"
  tls:
    - secretName: ml-portal-tls
      hosts:
        - portal.example.com

configMap:
  data:
    EMB_BASE_URL: "http://ml-portal-main-embedding:8001"
    QDRANT_URL: "https://qdrant.example.com:6333"
    S3_ENDPOINT: "https://s3.example.com"
    S3_PUBLIC_ENDPOINT: "https://files.example.com"
    LLM_BASE_URL: "http://llm-service.gpu-cluster.svc:8000/v1"
    RERANK_BASE_URL: "http://rerank-service.gpu-cluster.svc:8002"
    CORS_ALLOW_ORIGINS: "https://portal.example.com"
    IDEMPOTENCY_ENABLED: "true"

# Secrets should be managed via external-secrets or sealed-secrets
# This is just a placeholder
secrets: {}

serviceMonitor:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 2
