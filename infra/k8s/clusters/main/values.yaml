# =============================================================================
# ML Portal Main Cluster - Default Values
# =============================================================================

# Global settings
global:
  environment: production
  domain: portal.example.com
  imageRegistry: registry.example.com
  imagePullSecrets:
    - name: registry-credentials

# =============================================================================
# Frontend Configuration
# =============================================================================
frontend:
  enabled: true
  replicaCount: 3
  
  image:
    repository: ml-portal-frontend
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# =============================================================================
# API Configuration
# =============================================================================
api:
  enabled: true
  replicaCount: 5
  
  image:
    repository: ml-portal-api
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  livenessProbe:
    httpGet:
      path: /api/v1/healthz
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /api/v1/ready
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  env:
    ENV: production
    DEBUG: "false"
    LOG_LEVEL: INFO
    PYTHONUNBUFFERED: "1"
  
  envFrom:
    - configMapRef:
        name: app-config
    - secretRef:
        name: app-secrets

# =============================================================================
# Workers Configuration
# =============================================================================
workers:
  enabled: true
  replicaCount: 4
  
  image:
    repository: ml-portal-worker
    tag: latest
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    # Custom metric for Celery queue length
    customMetrics:
      - type: External
        external:
          metric:
            name: celery_queue_length
          target:
            type: AverageValue
            averageValue: "10"
  
  livenessProbe:
    exec:
      command:
        - celery
        - -A
        - app.celery_app
        - inspect
        - ping
    initialDelaySeconds: 60
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  env:
    ENV: production
    DEBUG: "false"
    LOG_LEVEL: INFO
    PYTHONUNBUFFERED: "1"
  
  envFrom:
    - configMapRef:
        name: app-config
    - secretRef:
        name: app-secrets

# =============================================================================
# Embedding Service Configuration
# =============================================================================
embedding:
  enabled: true
  replicaCount: 3
  
  image:
    repository: ml-portal-embedding
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8001
    targetPort: 8001
  
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  
  autoscaling:
    enabled: false
  
  livenessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /health
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  env:
    EMB_MODELS: "all-MiniLM-L6-v2,multilingual-e5-small,bge-large-en"
    EMB_BATCH_SIZE: "128"
    EMB_MAX_WAIT_MS: "8"
  
  # Optional: PVC for model cache
  persistence:
    enabled: false
    storageClass: ""
    size: 10Gi
    mountPath: /models_cache

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: nginx
  
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  
  tls:
    - secretName: ml-portal-tls
      hosts:
        - portal.example.com
  
  rules:
    - host: portal.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: api
              port: 8000
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port: 3000

# =============================================================================
# ConfigMap - Application Configuration
# =============================================================================
configMap:
  data:
    # Service endpoints
    EMB_BASE_URL: "http://embedding-service:8001"
    QDRANT_URL: "http://qdrant.external.svc:6333"
    S3_ENDPOINT: "https://s3.example.com"
    S3_PUBLIC_ENDPOINT: "https://files.example.com"
    LLM_BASE_URL: "http://llm-service.gpu-cluster.svc:8000/v1"
    RERANK_BASE_URL: "http://rerank-service.gpu-cluster.svc:8002"
    
    # Application settings
    CORS_ALLOW_ORIGINS: "https://portal.example.com"
    UPLOAD_MAX_BYTES: "104857600"
    UPLOAD_ALLOWED_MIME: "application/pdf,image/png,image/jpeg,application/octet-stream"
    
    # JWT settings
    JWT_ALGORITHM: "HS256"
    JWT_ISSUER: "urn:ml-portal"
    JWT_AUDIENCE: "urn:ml-portal:api"
    JWT_ACCESS_TTL_MINUTES: "15"
    JWT_REFRESH_TTL_DAYS: "30"
    
    # Feature flags
    IDEMPOTENCY_ENABLED: "true"
    PAT_ENABLED: "true"

# =============================================================================
# Secrets (values from external secret manager or sealed secrets)
# =============================================================================
secrets:
  # Database
  DATABASE_URL: ""  # postgresql://user:pass@host:5432/db
  POSTGRES_PASSWORD: ""
  
  # Redis
  REDIS_URL: ""  # redis://host:6379/0
  CELERY_BROKER_URL: ""  # redis://host:6379/0
  CELERY_RESULT_BACKEND: ""  # redis://host:6379/1
  
  # S3/MinIO
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  
  # JWT
  JWT_SECRET: ""  # minimum 256 bits
  
  # LLM API
  LLM_API_KEY: ""
  
  # Qdrant
  QDRANT_API_KEY: ""

# =============================================================================
# Network Policies
# =============================================================================
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow ingress controller to frontend/api
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000
  
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    
    # Allow PostgreSQL
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    
    # Allow Redis
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
    
    # Allow HTTPS (external APIs)
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 443

# =============================================================================
# Service Monitor (Prometheus)
# =============================================================================
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# =============================================================================
# Deployment Strategy
# =============================================================================
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
