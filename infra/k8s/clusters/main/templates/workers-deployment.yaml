{{- if .Values.workers.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ml-portal.fullname" . }}-workers
  labels:
    {{- include "ml-portal.workers.labels" . | nindent 4 }}
spec:
  {{- if not .Values.workers.autoscaling.enabled }}
  replicas: {{ .Values.workers.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "ml-portal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: workers
  template:
    metadata:
      labels:
        {{- include "ml-portal.workers.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- include "ml-portal.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.workers.securityContext | nindent 8 }}
      containers:
      - name: worker
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.workers.image.repository }}:{{ .Values.workers.image.tag }}"
        imagePullPolicy: {{ .Values.workers.image.pullPolicy }}
        env:
        {{- range $key, $value := .Values.workers.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        envFrom:
        {{- toYaml .Values.workers.envFrom | nindent 8 }}
        livenessProbe:
          {{- toYaml .Values.workers.livenessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.workers.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.workers.securityContext | nindent 10 }}
{{- end }}
