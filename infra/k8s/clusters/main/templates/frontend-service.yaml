{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ml-portal.fullname" . }}-frontend
  labels:
    {{- include "ml-portal.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "ml-portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
