{{- if .Values.embedding.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ml-portal.fullname" . }}-embedding
  labels:
    {{- include "ml-portal.embedding.labels" . | nindent 4 }}
spec:
  {{- if not .Values.embedding.autoscaling.enabled }}
  replicas: {{ .Values.embedding.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "ml-portal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: embedding
  template:
    metadata:
      labels:
        {{- include "ml-portal.embedding.labels" . | nindent 8 }}
    spec:
      {{- include "ml-portal.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.embedding.securityContext | nindent 8 }}
      containers:
      - name: embedding
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.embedding.image.repository }}:{{ .Values.embedding.image.tag }}"
        imagePullPolicy: {{ .Values.embedding.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.embedding.service.targetPort }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.embedding.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.embedding.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.embedding.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.embedding.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.embedding.securityContext | nindent 10 }}
        {{- if .Values.embedding.persistence.enabled }}
        volumeMounts:
        - name: models-cache
          mountPath: {{ .Values.embedding.persistence.mountPath }}
        {{- end }}
      {{- if .Values.embedding.persistence.enabled }}
      volumes:
      - name: models-cache
        persistentVolumeClaim:
          claimName: {{ include "ml-portal.fullname" . }}-embedding-pvc
      {{- end }}
{{- end }}
