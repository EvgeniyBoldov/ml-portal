# =============================================================================
# ML Portal GPU Cluster - Default Values
# =============================================================================

# Global settings
global:
  environment: production
  imageRegistry: registry.example.com
  imagePullSecrets:
    - name: registry-credentials

# =============================================================================
# LLM Service (vLLM) Configuration
# =============================================================================
llm:
  enabled: true
  replicaCount: 1
  
  image:
    repository: vllm/vllm-openai
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  
  # GPU configuration
  gpu:
    enabled: true
    type: nvidia.com/gpu
    count: 1
    # Node selector for GPU nodes
    nodeSelector:
      gpu: "true"
      gpu-type: "a10"  # or a100, t4
    
    # Tolerations for GPU nodes
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  
  resources:
    requests:
      cpu: 8
      memory: 32Gi
    limits:
      cpu: 16
      memory: 64Gi
      nvidia.com/gpu: 1
  
  # vLLM specific configuration
  env:
    # Model configuration
    MODEL_NAME: "meta-llama/Llama-3.1-70b-Instruct"
    TENSOR_PARALLEL_SIZE: "1"
    MAX_MODEL_LEN: "4096"
    GPU_MEMORY_UTILIZATION: "0.9"
    
    # API configuration
    HOST: "0.0.0.0"
    PORT: "8000"
    
    # Performance tuning
    DTYPE: "auto"
    QUANTIZATION: ""  # or "awq", "gptq"
    ENABLE_PREFIX_CACHING: "true"
  
  # Persistent volume for models
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: 200Gi
    mountPath: /models
  
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 120
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  securityContext:
    runAsNonRoot: false  # vLLM may need root for GPU access
    runAsUser: 0
    fsGroup: 0

# =============================================================================
# Rerank Service Configuration
# =============================================================================
rerank:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ml-portal-rerank
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8002
    targetPort: 8002
  
  # GPU configuration
  gpu:
    enabled: true
    type: nvidia.com/gpu
    count: 1
    # Node selector for GPU nodes
    nodeSelector:
      gpu: "true"
      gpu-type: "t4"  # T4 is sufficient for rerank
    
    # Tolerations for GPU nodes
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  
  resources:
    requests:
      cpu: 4
      memory: 16Gi
    limits:
      cpu: 8
      memory: 32Gi
      nvidia.com/gpu: 1
  
  env:
    RERANK_MODEL_PATH: "/models/cross-encoder--ms-marco-MiniLM-L-6-v2"
    PYTHONUNBUFFERED: "1"
  
  # Persistent volume for models
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: 10Gi
    mountPath: /models
  
  livenessProbe:
    httpGet:
      path: /health
      port: 8002
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /health
      port: 8002
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# =============================================================================
# Service Monitor (Prometheus)
# =============================================================================
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    prometheus: kube-prometheus

# =============================================================================
# Network Policies
# =============================================================================
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow from main cluster only
    - from:
        - namespaceSelector:
            matchLabels:
              name: ml-portal-main
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8002
  
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    
    # Allow HTTPS (for model downloads)
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 443

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 0  # GPU pods can be disrupted (only 1 replica)
