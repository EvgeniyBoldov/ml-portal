{{- if .Values.rerank.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: rerank-service
  labels:
    app: rerank-service
    component: gpu
spec:
  type: {{ .Values.rerank.service.type }}
  ports:
  - port: {{ .Values.rerank.service.port }}
    targetPort: {{ .Values.rerank.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: rerank-service
{{- end }}
