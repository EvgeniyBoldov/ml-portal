{{- if .Values.rerank.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rerank-service
  labels:
    app: rerank-service
    component: gpu
spec:
  replicas: {{ .Values.rerank.replicaCount }}
  selector:
    matchLabels:
      app: rerank-service
  template:
    metadata:
      labels:
        app: rerank-service
        component: gpu
    spec:
      {{- if .Values.rerank.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.rerank.gpu.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.rerank.gpu.tolerations }}
      tolerations:
        {{- toYaml .Values.rerank.gpu.tolerations | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.rerank.securityContext | nindent 8 }}
      containers:
      - name: rerank
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.rerank.image.repository }}:{{ .Values.rerank.image.tag }}"
        imagePullPolicy: {{ .Values.rerank.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.rerank.service.targetPort }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.rerank.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.rerank.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.rerank.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.rerank.readinessProbe | nindent 10 }}
        securityContext:
          {{- toYaml .Values.rerank.securityContext | nindent 10 }}
        {{- if .Values.rerank.persistence.enabled }}
        volumeMounts:
        - name: models
          mountPath: {{ .Values.rerank.persistence.mountPath }}
        {{- end }}
      {{- if .Values.rerank.persistence.enabled }}
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: rerank-models-pvc
      {{- end }}
{{- end }}
