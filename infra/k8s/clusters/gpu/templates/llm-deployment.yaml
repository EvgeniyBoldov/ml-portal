{{- if .Values.llm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  labels:
    app: llm-service
    component: gpu
spec:
  replicas: {{ .Values.llm.replicaCount }}
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
        component: gpu
    spec:
      {{- if .Values.llm.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.llm.gpu.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.llm.gpu.tolerations }}
      tolerations:
        {{- toYaml .Values.llm.gpu.tolerations | nindent 8 }}
      {{- end }}
      containers:
      - name: vllm
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.llm.image.repository }}:{{ .Values.llm.image.tag }}"
        imagePullPolicy: {{ .Values.llm.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.llm.service.targetPort }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.llm.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.llm.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.llm.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.llm.readinessProbe | nindent 10 }}
        {{- if .Values.llm.persistence.enabled }}
        volumeMounts:
        - name: models
          mountPath: {{ .Values.llm.persistence.mountPath }}
        {{- end }}
      {{- if .Values.llm.persistence.enabled }}
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: llm-models-pvc
      {{- end }}
{{- end }}
