{{- if .Values.llm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  labels:
    app: llm-service
    component: gpu
spec:
  type: {{ .Values.llm.service.type }}
  ports:
  - port: {{ .Values.llm.service.port }}
    targetPort: {{ .Values.llm.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: llm-service
{{- end }}
