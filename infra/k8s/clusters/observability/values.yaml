# =============================================================================
# ML Portal Observability Cluster - Default Values
# =============================================================================

# Global settings
global:
  environment: production
  domain: monitoring.example.com

# =============================================================================
# Prometheus Stack Configuration
# =============================================================================
prometheus:
  enabled: true

kube-prometheus-stack:
  # Prometheus configuration
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "90GB"
      
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: fast-ssd
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
      
      resources:
        requests:
          cpu: 1000m
          memory: 4Gi
        limits:
          cpu: 2000m
          memory: 8Gi
      
      # Remote write to long-term storage (optional)
      # remoteWrite:
      #   - url: http://victoriametrics:8428/api/v1/write
      
      # Additional scrape configs for external services
      additionalScrapeConfigs:
        - job_name: 'postgres-exporter'
          static_configs:
            - targets: ['postgres-exporter.external.svc:9187']
        
        - job_name: 'redis-exporter'
          static_configs:
            - targets: ['redis-exporter.external.svc:9121']
        
        - job_name: 'qdrant'
          static_configs:
            - targets: ['qdrant.external.svc:6333']
          metrics_path: /metrics
        
        - job_name: 'minio'
          static_configs:
            - targets: ['minio.external.svc:9000']
          metrics_path: /minio/v2/metrics/cluster
  
  # Grafana configuration
  grafana:
    enabled: true
    
    adminPassword: "changeme"  # Change in production!
    
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.monitoring.example.com
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.monitoring.example.com
    
    persistence:
      enabled: true
      storageClassName: standard
      size: 10Gi
    
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    
    # Datasources
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
      
      - name: Prometheus
        type: prometheus
        url: http://prometheus-operated:9090
        access: proxy
        isDefault: true
    
    # Pre-configured dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    
    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Prometheus
        
        api-performance:
          gnetId: 12230
          revision: 1
          datasource: Prometheus
        
        gpu-metrics:
          gnetId: 12239
          revision: 1
          datasource: Prometheus
  
  # Alertmanager configuration
  alertmanager:
    enabled: true
    
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: standard
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi
    
    config:
      global:
        resolve_timeout: 5m
      
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
        receiver: 'default'
        routes:
          - match:
              severity: critical
            receiver: 'critical'
          - match:
              severity: warning
            receiver: 'warning'
      
      receivers:
        - name: 'default'
          # Configure your notification channels here
          # webhook_configs:
          #   - url: 'http://alertmanager-webhook:8080/webhook'
        
        - name: 'critical'
          # PagerDuty, Telegram, etc.
          # telegram_configs:
          #   - bot_token: 'YOUR_BOT_TOKEN'
          #     chat_id: YOUR_CHAT_ID
        
        - name: 'warning'
          # Slack, Email, etc.
          # slack_configs:
          #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
          #     channel: '#alerts'

# =============================================================================
# Loki Configuration
# =============================================================================
loki:
  enabled: true

loki:
  loki:
    auth_enabled: false
    
    commonConfig:
      replication_factor: 1
    
    storage:
      type: 's3'
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      s3:
        endpoint: s3.example.com
        region: us-east-1
        secretAccessKey: ${S3_SECRET_KEY}
        accessKeyId: ${S3_ACCESS_KEY}
        s3ForcePathStyle: true
        insecure: false
    
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    
    limits_config:
      retention_period: 30d
      max_query_lookback: 30d
  
  write:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  
  read:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  
  backend:
    replicas: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

# =============================================================================
# Promtail Configuration (Log collector)
# =============================================================================
promtail:
  enabled: true

promtail:
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    
    snippets:
      scrapeConfigs: |
        - job_name: kubernetes-pods
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              target_label: app
            - source_labels: [__meta_kubernetes_pod_label_component]
              target_label: component
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# =============================================================================
# Custom Alerts
# =============================================================================
customAlerts:
  enabled: true
  
  rules:
    - name: ml-portal-api
      rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.01
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }} errors/sec"
        
        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High API latency"
            description: "P95 latency is {{ $value }}s"
    
    - name: ml-portal-gpu
      rules:
        - alert: GPUMemoryHigh
          expr: nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "GPU memory usage high"
            description: "GPU memory usage is {{ $value | humanizePercentage }}"
        
        - alert: GPUUtilizationLow
          expr: nvidia_gpu_duty_cycle < 10
          for: 30m
          labels:
            severity: info
          annotations:
            summary: "GPU underutilized"
            description: "GPU utilization is only {{ $value }}%"
    
    - name: ml-portal-database
      rules:
        - alert: PostgreSQLDown
          expr: up{job="postgres-exporter"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL is down"
        
        - alert: PostgreSQLConnectionPoolExhausted
          expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connection pool nearly exhausted"
            description: "{{ $value | humanizePercentage }} of connections in use"
