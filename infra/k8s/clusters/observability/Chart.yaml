apiVersion: v2
name: ml-portal-observability
description: ML Portal Observability Cluster - Prometheus, Grafana, Loki
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ml-portal
  - prometheus
  - grafana
  - loki
  - monitoring
  - observability
maintainers:
  - name: ML Portal Team
    email: team@example.com

dependencies:
  - name: kube-prometheus-stack
    version: "~55.0.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  
  - name: loki
    version: "~5.41.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  
  - name: promtail
    version: "~6.15.0"
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
