# Nginx configuration for public file access via MinIO
# This configuration proxies requests to MinIO for presigned URLs

server {
    listen 443 ssl http2;
    server_name files.localhost;

    # SSL configuration (for development, use self-signed certs)
    ssl_certificate /etc/ssl/certs/files.localhost.crt;
    ssl_certificate_key /etc/ssl/certs/files.localhost.key;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy all requests to MinIO
    location / {
        proxy_pass http://minio:9000;
        
        # Important: use minio:9000 as host for presigned URL validation
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # HTTP/1.1 for better performance
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Disable buffering for large files
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Support for range requests (resume downloads)
        proxy_set_header Range $http_range;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Max file size (adjust as needed)
        client_max_body_size 100M;
    }

    # Block potentially dangerous MinIO admin paths
    location ~* ^/minio/(admin|api) {
        deny all;
        return 403;
    }

    # Block access to MinIO console
    location ~* ^/minio/ {
        deny all;
        return 403;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name files.localhost;
    return 301 https://$server_name:8443$request_uri;
}

