server {
    listen 80;
    server_name _;

    # Strict CORS (align with dev)
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,Idempotency-Key,X-Tenant-Id,X-Request-ID" always;
    add_header Access-Control-Expose-Headers "X-Request-ID,X-API-Version,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset,Retry-After" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP report-only baseline
    add_header Content-Security-Policy-Report-Only "default-src 'self'; connect-src 'self'; img-src 'self' data:;" always;

    proxy_http_version 1.1;
    proxy_buffering off;
    chunked_transfer_encoding on;

    # SSE events stream - no buffering allowed
    location /api/v1/rag/events {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical SSE settings - disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        
        # Headers to disable buffering at all levels
        add_header X-Accel-Buffering no always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        
        # Long timeouts for SSE connections
        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        # Disable gzip for SSE
        gzip off;
    }

    location /api/v1/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        add_header X-Accel-Buffering no;
        
        # SSE support
        proxy_http_version 1.1;
        proxy_read_timeout 1h;
    }

    location /metrics {
        allow 10.0.0.0/8; # adjust
        deny all;
        proxy_pass http://api:8000/metrics;
    }
}
