name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd apps/api
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Check migration state
      run: |
        cd apps/api
        python -m alembic current
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0

    - name: Run migrations
      run: |
        cd apps/api
        python -m alembic upgrade head
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
    
    - name: Run backend runtime core tests
      run: |
        cd apps/api
        pytest tests/unit -q --tb=short --maxfail=10 \
          --cov=app.runtime \
          --cov=app.agents.contracts \
          --cov=app.agents.credential_resolver \
          --cov=app.agents.execution_preflight \
          --cov=app.agents.operation_router \
          --cov=app.agents.runtime_rbac_resolver \
          --cov-fail-under=70 \
          --cov-report=term-missing \
          --cov-report=xml:coverage-runtime.xml \
          --junitxml=api-unit-results.xml
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENV: test

    - name: Validate runtime args contract (jsonschema ON)
      run: |
        cd apps/api
        pytest tests/unit/test_runtime_operation_validation.py -q --tb=short
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENV: test

    - name: Validate runtime args contract (jsonschema OFF fallback)
      run: |
        cd apps/api
        RUNTIME_DISABLE_JSONSCHEMA=1 pytest tests/unit/test_runtime_operation_validation.py -q --tb=short
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENV: test

    - name: Run backend runtime integration tests
      run: |
        cd apps/api
        pytest tests/integration -q --tb=short --maxfail=5 -k "runtime or mcp or credential or collection or confirmation"
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENV: test

    - name: Run backend runtime eval tests
      run: |
        cd apps/api
        pytest tests/eval -q --tb=short
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        ASYNC_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENV: test
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: apps/api/coverage-runtime.xml
        flags: backend
        name: backend-runtime-coverage
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: backend-test-results
        path: |
          apps/api/coverage-runtime.xml
          apps/api/api-unit-results.xml

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
    
    - name: Install dependencies
      run: |
        cd apps/web
        npm ci
    
    - name: Run linting
      run: |
        cd apps/web
        npm run lint
    
    - name: Run type checking
      run: |
        cd apps/web
        npm run type-check
    
    - name: Run unit tests
      run: |
        cd apps/web
        npm run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: apps/web/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: frontend-test-results
        path: |
          apps/web/coverage/
          apps/web/test-results/

  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
    
    - name: Install backend dependencies
      run: |
        cd apps/api
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Install frontend dependencies
      run: |
        cd apps/web
        npm ci
    
    - name: Run migrations
      run: |
        cd apps/api
        python -m alembic upgrade head
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
    
    - name: Start backend server
      run: |
        cd apps/api
        PYTHONPATH=src python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENV: test
    
    - name: Build frontend
      run: |
        cd apps/web
        npm run build
    
    - name: Install Playwright browsers
      run: |
        cd apps/web
        npx playwright install --with-deps
    
    - name: Run Runtime E2E Gates
      run: |
        cd apps/web
        npx playwright test e2e-tests/runtime-smoke.spec.ts e2e-tests/runtime-confirmation.spec.ts --project=chromium --reporter=line
      env:
        API_BASE_URL: http://localhost:8000/api
    
    - name: Upload E2E test results
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: playwright-report
        path: apps/web/playwright-report/

  security-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
