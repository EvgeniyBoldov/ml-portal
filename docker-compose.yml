services:
  # =============================================================================
  # DATABASE SERVICES
  # =============================================================================

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Remote PostgreSQL — used by SQL MCP shim (dbhub-mcp) as demo external data source
  postgres-remote:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${REMOTE_POSTGRES_DB}
      POSTGRES_USER: ${REMOTE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${REMOTE_POSTGRES_PASSWORD}
    volumes:
      - postgres_remote_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REMOTE_POSTGRES_USER} -d ${REMOTE_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # VECTOR DATABASE
  # =============================================================================

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}

  # =============================================================================
  # OBJECT STORAGE — MinIO
  # =============================================================================

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: files.localhost
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # BACKEND API SERVICE
  # =============================================================================

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/src/app:/app/app
      - ./apps/api/tests:/app/tests
      - ./apps/api/pytest.ini:/app/pytest.ini
      - ./models_llm:/app/models_llm
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - MODELS_ROOT=/app/models_llm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade heads &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # FRONTEND DEVELOPMENT SERVICE
  # =============================================================================

  frontend:
    image: node:20-alpine
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    env_file: .env
    environment:
      - NODE_ENV=development
    command: >
      sh -c "
        if [ ! -d 'node_modules' ] || [ ! -d 'node_modules/react-markdown' ]; then
          npm install --legacy-peer-deps
        fi &&
        rm -f node_modules/style-to-object/cjs/index.js.map 2>/dev/null || true &&
        npm run dev -- --host 0.0.0.0
      "
    depends_on:
      - api

  # =============================================================================
  # MCP SERVERS
  # =============================================================================

  netbox-mcp-custom:
    build:
      context: .
      dockerfile: mcp/mcp_server.dockerfile
      args:
        - MCP_SERVER_DIR=netbox
    ports:
      - "8012:8080"
    volumes:
      - ./mcp/netbox/server.py:/opt/mcp/netbox/server.py:ro
    environment:
      - PORT=8080
      - NETBOX_URL=${NETBOX_URL}
      - VERIFY_SSL=false
      - NETBOX_TIMEOUT_SECONDS=20
      - MCP_SECRET_BROKER_TIMEOUT_SECONDS=10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  dbhub-mcp:
    build:
      context: .
      dockerfile: mcp/mcp_server.dockerfile
      args:
        - MCP_SERVER_DIR=sql
    ports:
      - "8011:8080"
    environment:
      - PORT=8080
      - DB_DSN=postgres://${REMOTE_POSTGRES_USER}:${REMOTE_POSTGRES_PASSWORD}@${REMOTE_POSTGRES_HOST:-postgres-remote}:5432/${REMOTE_POSTGRES_DB}?sslmode=disable
      - DB_READONLY=true
      - DB_MAX_ROWS=200
    depends_on:
      postgres-remote:
        condition: service_healthy
    restart: unless-stopped

  # =============================================================================
  # EMBEDDING SERVICES
  # Each instance serves one model. Add more instances for additional models.
  # API resolves the correct instance by EMB_BASE_URL stored in the models table.
  # =============================================================================

  # Primary embedding model: all-MiniLM-L6-v2 (384 dims) — fast, general purpose
  emb:
    build:
      context: .
      dockerfile: infra/docker/emb/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - EMB_MODEL_PATH=/models_llm/sentence-transformers--all-MiniLM-L6-v2
      - EMB_BATCH_SIZE=32
      - EMB_MAX_WAIT_MS=15
      - EMB_MODEL_PARALLELISM=2
    volumes:
      - ./models_llm:/models_llm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Example: second embedding instance for a larger model (e1024 dims).
  # Uncomment and adjust when you need a second embedding model.
  # Register it in the models table with base_url=http://emb-large:8001
  # ---------------------------------------------------------------------------
  # emb-large:
  #   build:
  #     context: .
  #     dockerfile: infra/docker/emb/Dockerfile
  #   ports:
  #     - "8003:8001"
  #   environment:
  #     - EMB_MODEL_PATH=/models_llm/intfloat--multilingual-e5-large
  #     - EMB_BATCH_SIZE=32
  #     - EMB_MAX_WAIT_MS=15
  #     - EMB_MODEL_PARALLELISM=1
  #   volumes:
  #     - ./models_llm:/models_llm:ro
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 120s

  # =============================================================================
  # RERANKER SERVICE
  # =============================================================================

  rerank:
    build:
      context: .
      dockerfile: infra/docker/rerank/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - RERANK_MODEL_PATH=/models_llm/cross-encoder--ms-marco-MiniLM-L-6-v2
    volumes:
      - ./models_llm:/models_llm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # CELERY WORKER
  # =============================================================================

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker/Dockerfile
    volumes:
      - ./apps/api/src/app:/app/app
      - ./models_llm:/models_llm:ro
    env_file: .env
    environment:
      - PYTHONPATH=/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=4"]

  flower:
    image: mher/flower:2.0.1
    ports:
      - "5555:5555"
    environment:
      FLOWER_BASIC_AUTH: ${DEFAULT_ADMIN_LOGIN}:${DEFAULT_ADMIN_PASSWORD}
      FLOWER_PORT: 5555
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  # =============================================================================
  # NGINX REVERSE PROXY
  # =============================================================================

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT_HTTP:-80}:80"
      - "8080:8080"
      - "8443:443"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/files.conf:/etc/nginx/conf.d/files.conf:ro
      - ./infra/ssl:/etc/ssl/certs:ro
    depends_on:
      - api
      - frontend
      - minio
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://api:8000/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  postgres_remote_data:
  redis_data:
  minio_data:
  qdrant_data:
  frontend_node_modules:
