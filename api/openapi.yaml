    Body_upload_rag_file_api_v1_rag_upload_post:
      properties:
        file:
          type: string
          format: binary
          title: File
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        tags:
          anyOf:
          - type: string
          - type: 'null'
          title: Tags
      type: object
      required:
      - file
      title: Body_upload_rag_file_api_v1_rag_upload_post
    ChunkProfile:
      type: string
      enum:
      - by_tokens
      - by_sentences
      - by_paragraphs
      - by_pages
      title: ChunkProfile
      description: Chunking profiles
    DocumentStatus:
      type: string
      enum:
      - queued
      - extracting
      - chunking
      - embedding
      - indexing
      - ready
      - failed
      - canceled
      title: DocumentStatus
      description: Document processing status
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IngestProgress:
      properties:
        document_id:
          type: string
          format: uuid
          title: Document Id
        current_step:
          $ref: '#/components/schemas/Step'
        progress:
          type: number
          maximum: 100.0
          minimum: 0.0
          title: Progress
        completed_steps:
          items:
            $ref: '#/components/schemas/Step'
          type: array
          title: Completed Steps
        failed_steps:
          items:
            $ref: '#/components/schemas/Step'
          type: array
          title: Failed Steps
        models_processed:
          items:
            type: string
          type: array
          title: Models Processed
        total_chunks:
          type: integer
          title: Total Chunks
          default: 0
        processed_chunks:
          type: integer
          title: Processed Chunks
          default: 0
      type: object
      required:
      - document_id
      - current_step
      - progress
      title: IngestProgress
      description: Ingest progress schema
    IngestRequest:
      properties:
        document_id:
          type: string
          format: uuid
          title: Document Id
        models:
          items:
            type: string
          type: array
          title: Models
        chunk_profile:
          allOf:
          - $ref: '#/components/schemas/ChunkProfile'
          default: by_tokens
        force_reprocess:
          type: boolean
          title: Force Reprocess
          default: false
      type: object
      required:
      - document_id
      title: IngestRequest
      description: Ingest request schema
    IngestResponse:
      properties:
        document_id:
          type: string
          format: uuid
          title: Document Id
        status:
          $ref: '#/components/schemas/DocumentStatus'
        progress:
          $ref: '#/components/schemas/IngestProgress'
        ingest_run_id:
          type: string
          format: uuid
          title: Ingest Run Id
      type: object
      required:
      - document_id
      - status
      - progress
      - ingest_run_id
      title: IngestResponse
      description: Ingest response schema
