[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: Unit tests (fast, no external deps)
    e2e: E2E tests (require running API)
    slow: Slow tests
    cleanup: Cleanup tests (run last)
    netbox: Tests requiring Netbox API access
    llm: Tests requiring real LLM API access
    order: Test execution order
